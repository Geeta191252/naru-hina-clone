<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch Ads to Unlock File</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<!-- Monetag SDK is injected by JS with retry support for Telegram WebView -->
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--tg-theme-bg-color,#0f172a);color:var(--tg-theme-text-color,#fff);overflow:hidden}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .card{width:100%;max-width:380px;background:var(--tg-theme-secondary-bg-color,#1e293b);border-radius:20px;padding:32px 24px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  h1{font-size:22px;margin-bottom:8px;font-weight:700}
  p.sub{font-size:14px;opacity:.75;margin-bottom:24px;line-height:1.5}
  button{width:100%;padding:16px;border:none;border-radius:14px;background:var(--tg-theme-button-color,#3b82f6);color:var(--tg-theme-button-text-color,#fff);font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .2s}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success{font-size:60px;margin-bottom:16px}
  .err{color:#ef4444;font-size:13px;margin-top:12px;min-height:16px}
  .footer{position:fixed;bottom:12px;font-size:11px;opacity:.4}
</style>
</head>
<body>
  <div class="card" id="card">
    <h1 id="title">Watch ads to unlock</h1>
    <p class="sub" id="subtitle">Tap the button below and keep this screen open.</p>
    <button id="actionBtn" onclick="handleClick()">🎬 Watch Ads & Get File</button>
    <div class="err" id="err"></div>
  </div>
  <div class="footer">Powered by Monetag</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const TOTAL = {{ads_count}};
  const TOKEN = "{{token}}";
  const VERIFY_URL = "{{verify_url}}";
  const REDIRECT_URL = "{{redirect_url}}";
  const ZONE_ID = "{{zone_id}}";
  const SDK_SRC = 'https://libtl.com/sdk.js';

  let started = false;
  let completed = false;
  let sdkPromise = null;
  const btn = document.getElementById('actionBtn');
  const err = document.getElementById('err');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');

  function setBtn(text, disabled = false) {
    btn.innerHTML = text;
    btn.disabled = disabled;
  }

  function getShowFn() {
    return window['show_' + ZONE_ID];
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function withTimeout(promise, ms, message) {
    let timer;
    const timeout = new Promise((_, reject) => {
      timer = setTimeout(() => reject(new Error(message)), ms);
    });
    return Promise.race([promise, timeout]).finally(() => clearTimeout(timer));
  }

  function injectSdkScript(force = false) {
    const existingShow = getShowFn();
    if (typeof existingShow === 'function') return Promise.resolve(existingShow);
    if (sdkPromise && !force) return sdkPromise;

    const oldTag = document.getElementById('monetagSdk');
    if (oldTag) oldTag.remove();

    sdkPromise = new Promise((resolve, reject) => {
      const tag = document.createElement('script');
      tag.id = 'monetagSdk';
      tag.src = SDK_SRC + '?v=' + Date.now();
      tag.async = false;
      tag.setAttribute('data-zone', ZONE_ID);
      tag.setAttribute('data-sdk', 'show_' + ZONE_ID);

      let settled = false;
      const finish = (ok, value) => {
        if (settled) return;
        settled = true;
        clearTimeout(timer);
        ok ? resolve(value) : reject(new Error(value));
      };

      const timer = setTimeout(() => finish(false, 'Ad SDK load timeout'), 15000);
      tag.onload = async () => {
        for (let i = 0; i < 40; i++) {
          const fn = getShowFn();
          if (typeof fn === 'function') return finish(true, fn);
          await sleep(250);
        }
        finish(false, 'Ad SDK loaded but show_' + ZONE_ID + ' not found');
      };
      tag.onerror = () => finish(false, 'Ad SDK script blocked');
      document.head.appendChild(tag);
    }).catch(e => {
      sdkPromise = null;
      throw e;
    });

    return sdkPromise;
  }

  async function waitForSdk() {
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        return await injectSdkScript(attempt > 1);
      } catch (e) {
        console.warn('[Ads] SDK load attempt failed:', attempt, e.message);
        if (attempt < 3) await sleep(1000);
      }
    }
    throw new Error('Ad SDK blocked/not loaded. Check Monetag zone/domain.');
  }

  // Show TOTAL rewarded interstitial ads sequentially. Each showAd() resolves
  // when the user finishes (or skips) the ad, so we always know when to advance.
  async function showRewardedAdsSequentially() {
    const showAd = await waitForSdk();
    for (let i = 1; i <= TOTAL; i++) {
      title.textContent = `Ad ${i} of ${TOTAL}`;
      subtitle.textContent = 'Watch the full ad to continue.';
      setBtn(`<span class="loader"></span> Showing ad ${i}/${TOTAL}...`, true);
      try {
        await showAd();
      } catch (adErr) {
        console.warn('[Ads] showAd error on #' + i, adErr);
        // brief pause then retry once
        await sleep(1500);
        await showAd();
      }
      await sleep(800);
    }
  }

  async function handleClick() {
    if (started) return;
    started = true;
    btn.disabled = true;
    err.textContent = '';

    title.textContent = 'Ads loading...';
    subtitle.textContent = 'Do not close this screen.';

    try {
      setBtn('<span class="loader"></span> Loading Ads...', true);
      console.log('[Ads] Manual rewarded flow active count:', TOTAL, 'zone:', ZONE_ID);
      await showRewardedAdsSequentially();
      completed = true;
      console.log('[Ads] All ads completed');
    } catch (e) {
      console.error(e);
      err.textContent = e.message || 'Ad failed. Please try again.';
      setBtn('Retry');
      btn.disabled = false;
      started = false;
      return;
    }
    await finish();
  }

  // Preload SDK only. Ads must be started by a real user tap, otherwise
  // Telegram/Android WebView can block Monetag from opening the ad.
  window.addEventListener('load', () => setTimeout(ensureSdkScript, 300));

  async function finish() {
    setBtn('<span class="loader"></span> Verifying...', true);
    title.textContent = 'Almost done!';
    subtitle.textContent = 'Confirming your reward...';
    try {
      const res = await fetch(VERIFY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: TOKEN, ads_watched: completed ? TOTAL : 0 })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || 'Verification failed');

      document.getElementById('card').innerHTML =
        '<div class="success">✅</div>' +
        '<h1>All done!</h1>' +
        '<p class="sub" style="margin:12px 0 24px">Opening your file in Telegram...</p>' +
        '<button onclick="goBack()">Open File</button>';
      setTimeout(goBack, 800);
    } catch (e) {
      err.textContent = e.message;
      setBtn('🔄 Retry Verification');
      btn.onclick = finish;
    }
  }

  function goBack() {
    if (tg) {
      tg.openTelegramLink(REDIRECT_URL);
      setTimeout(() => tg.close(), 300);
    } else {
      window.location.href = REDIRECT_URL;
    }
  }
</script>
</body>
</html>
