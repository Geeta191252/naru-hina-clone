<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch Ads to Unlock File</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--tg-theme-bg-color,#0f172a);color:var(--tg-theme-text-color,#fff);overflow:hidden}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .card{width:100%;max-width:380px;background:var(--tg-theme-secondary-bg-color,#1e293b);border-radius:20px;padding:32px 24px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  h1{font-size:22px;margin-bottom:8px;font-weight:700}
  p.sub{font-size:14px;opacity:.75;margin-bottom:24px;line-height:1.5}
  button{width:100%;padding:16px;border:none;border-radius:14px;background:var(--tg-theme-button-color,#3b82f6);color:var(--tg-theme-button-text-color,#fff);font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,opacity .2s}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .loader{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success{font-size:60px;margin-bottom:16px}
  .err{color:#ef4444;font-size:13px;margin-top:12px;min-height:16px}
  .footer{position:fixed;bottom:12px;font-size:11px;opacity:.4}
</style>
</head>
<body>
  <div class="card" id="card">
    <h1 id="title">Watch ads to unlock</h1>
    <p class="sub" id="subtitle">Tap the button below and keep this screen open.</p>
    <button id="actionBtn" onclick="handleClick()">🎬 Watch Ads & Get File</button>
    <div class="err" id="err"></div>
  </div>
  <div class="footer">Powered by Monetag</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  const MONETAG_TOTAL = 1; // 1 Monetag SDK rewarded ad
  const REQUIRED_ADS = 3; // Total: 1 SDK rewarded + 1 Monetag direct + 1 HilltopAds direct
  const TOKEN = "{{token}}";
  const VERIFY_URL = "{{verify_url}}";
  const REDIRECT_URL = "{{redirect_url}}";
  const ZONE_ID = "{{zone_id}}";
  const SDK_FN = 'show_' + ZONE_ID;
  // Multiple Monetag SDK CDN hosts. Some are blocked by ISPs/AdBlock — we try each.
  const SDK_HOSTS = ['libtl.com', 'doodiwom.com', 'tiwofey.com', 'arichoto.com'];
  // Monetag direct link — shown as 2nd ad (and SDK fallback)
  const MONETAG_DIRECT_LINK = 'https://omg10.com/4/10930676';
  // HilltopAds direct link — shown as 3rd ad (works on rooted phones too)
  const HILLTOP_DIRECT_LINK = 'https://fluffy-machine.com/far0wv';
  const DIRECT_LINKS = [MONETAG_DIRECT_LINK, HILLTOP_DIRECT_LINK];
  let started = false;
  let completed = false;
  let sdkInjected = false;
  let sdkLoadError = '';
  let directMode = false;
  let directWatched = 0;
  const btn = document.getElementById('actionBtn');
  const err = document.getElementById('err');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');

  function setBtn(text, disabled = false) {
    btn.innerHTML = text;
    btn.disabled = disabled;
  }
  function getShowFn() { return window[SDK_FN]; }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
  function withTimeout(p, ms, m) {
    let t; return Promise.race([p, new Promise((_, rj) => t = setTimeout(() => rj(new Error(m)), ms))]).finally(() => clearTimeout(t));
  }

  function injectSdk(host) {
    return new Promise((resolve, reject) => {
      const existing = document.querySelector('script[data-monetag-host="' + host + '"]');
      if (existing) return resolve();
      const tag = document.createElement('script');
      tag.src = 'https://' + host + '/sdk.js';
      tag.dataset.zone = ZONE_ID;
      tag.dataset.sdk = SDK_FN;
      tag.dataset.monetagHost = host;
      tag.async = true;
      tag.onload = () => { console.log('[Ads] SDK loaded from', host); resolve(); };
      tag.onerror = () => { console.error('[Ads] SDK failed from', host); reject(new Error('script error ' + host)); };
      document.head.appendChild(tag);
    });
  }

  async function ensureSdk() {
    if (typeof getShowFn() === 'function') return getShowFn();
    for (const host of SDK_HOSTS) {
      try {
        await injectSdk(host);
        // wait up to 8s after injection for global to appear
        for (let i = 0; i < 32; i++) {
          if (typeof getShowFn() === 'function') return getShowFn();
          await sleep(250);
        }
      } catch (e) {
        sdkLoadError = e.message;
      }
    }
    console.error('[Ads] SDK global missing after all hosts', {
      expected: SDK_FN,
      host: location.hostname,
      ua: navigator.userAgent,
      tg: !!window.Telegram?.WebApp,
      tgPlatform: window.Telegram?.WebApp?.platform,
      error: sdkLoadError
    });
    throw new Error('Ads load nahi ho rahe. AdBlock / VPN / private DNS off karo aur dobara try karo.');
  }

  // Rewarded Interstitial dashboard format: show_XXXX({...}).then(...)
  async function showRewardedAdsSequentially() {
    const showAd = await ensureSdk();
    for (let i = 1; i <= MONETAG_TOTAL; i++) {
      title.textContent = `Ad ${i} of ${REQUIRED_ADS}`;
      subtitle.textContent = 'Watch the full ad to continue.';
      setBtn(`<span class="loader"></span> Showing ad ${i}/${REQUIRED_ADS}...`, true);
      try {
        await withTimeout(
          Promise.resolve(showAd({ ymid: TOKEN + '_' + i, requestVar: 'unlock' })),
          120000,
          'Ad timeout — koi ad available nahi tha'
        );
      } catch (e) {
        // If first ad has zero feed, retry once after a short delay
        console.warn('[Ads] ad', i, 'failed:', e.message);
        await sleep(1500);
        await withTimeout(
          Promise.resolve(showAd({ ymid: TOKEN + '_' + i + '_r', requestVar: 'unlock_retry' })),
          120000,
          'Ad timeout (retry)'
        );
      }
      await sleep(600);
    }
  }

  // Direct Link flow — used as fallback when SDK is blocked (rooted phones, AdBlock, DNS filters)
  async function showDirectLinkAds() {
    directMode = true;
    return new Promise((resolve) => {
      function step() {
        if (directWatched >= MONETAG_TOTAL) { resolve(); return; }
        title.textContent = `Ad ${directWatched + 1} of ${REQUIRED_ADS}`;
        subtitle.textContent = 'Tap below — ad ek naye tab mein khulega. Wapas aakar continue dabaayein.';
        setBtn(`🎬 Open Ad ${directWatched + 1}/${REQUIRED_ADS}`, false);
        btn.onclick = () => {
          const link = DIRECT_LINKS[directWatched % DIRECT_LINKS.length];
          const url = link + (link.includes('?') ? '&' : '?') + 'var=' + encodeURIComponent(TOKEN + '_' + (directWatched + 1));
          if (tg && tg.openLink) { tg.openLink(url, { try_instant_view: false }); }
          else { window.open(url, '_blank'); }
          setTimeout(() => {
            subtitle.textContent = 'Ad dekhne ke baad neeche tap karein.';
            setBtn(`✅ I watched ad ${directWatched + 1} — Continue`, false);
            btn.onclick = () => { directWatched++; step(); };
          }, 1500);
        };
      }
      step();
    });
  }

  // Generic in-app sponsored ad overlay (iframe + countdown + fallback to external link).
  async function showInAppSponsoredAd(rawUrl, label, network) {
    return new Promise((resolve) => {
      const url = rawUrl + (rawUrl.includes('?') ? '&' : '?') + 'var=' + encodeURIComponent(TOKEN + '_' + label);
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column';
      const bar = document.createElement('div');
      bar.style.cssText = 'padding:10px 14px;background:#1e293b;color:#fff;font:600 14px -apple-system,sans-serif;display:flex;justify-content:space-between;align-items:center';
      bar.innerHTML = '<span>Sponsored Ad — ' + network + '</span><span id="adTimer_' + label + '">15s</span>';
      const frameWrap = document.createElement('div');
      frameWrap.style.cssText = 'flex:1;position:relative;background:#fff';
      const iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.style.cssText = 'width:100%;height:100%;border:0';
      iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
      iframe.setAttribute('allow', 'autoplay; fullscreen; clipboard-write; encrypted-media; picture-in-picture');
      frameWrap.appendChild(iframe);
      // Transparent click-catcher overlay — har tap ad ko naye tab me kholega
      const clickCatcher = document.createElement('div');
      clickCatcher.style.cssText = 'position:absolute;inset:0;background:transparent;cursor:pointer;z-index:5';
      clickCatcher.title = 'Tap to view sponsor';
      let userClicked = false;
      clickCatcher.onclick = () => {
        userClicked = true;
        if (tg && tg.openLink) { tg.openLink(url, { try_instant_view: false }); }
        else { window.open(url, '_blank'); }
        // Hint banner
        hint.textContent = '✅ Ad opened. Wait for timer to finish.';
      };
      const hint = document.createElement('div');
      hint.style.cssText = 'position:absolute;bottom:8px;left:8px;right:8px;padding:8px;background:rgba(0,0,0,.7);color:#fff;font:600 13px -apple-system,sans-serif;text-align:center;border-radius:8px;z-index:6;pointer-events:none';
      hint.textContent = '👆 Tap anywhere on the ad to support us';
      frameWrap.appendChild(clickCatcher);
      frameWrap.appendChild(hint);
      const closeBtn = document.createElement('button');
      closeBtn.textContent = 'Please wait...';
      closeBtn.disabled = true;
      closeBtn.style.cssText = 'margin:10px;padding:14px;border:0;border-radius:12px;background:#3b82f6;color:#fff;font:600 16px -apple-system,sans-serif;opacity:.5';
      overlay.appendChild(bar);
      overlay.appendChild(frameWrap);
      overlay.appendChild(closeBtn);
      document.body.appendChild(overlay);

      let loaded = false;
      let fellBack = false;
      iframe.onload = () => { loaded = true; };
      setTimeout(() => {
        if (!loaded) {
          fellBack = true;
          if (overlay.parentNode) document.body.removeChild(overlay);
          if (tg && tg.openLink) { tg.openLink(url, { try_instant_view: false }); }
          else { window.open(url, '_blank'); }
          title.textContent = 'One more ad (' + network + ')';
          subtitle.textContent = 'Ad naye tab mein khula. Wapas aakar Continue dabaayein.';
          setBtn('✅ I watched the ad — Continue', false);
          btn.onclick = () => resolve();
        }
      }, 4000);

      let secs = 15;
      const timerEl = bar.querySelector('#adTimer_' + label);
      const tick = setInterval(() => {
        if (fellBack) { clearInterval(tick); return; }
        secs--;
        if (secs > 0) {
          if (timerEl) timerEl.textContent = secs + 's';
        } else {
          clearInterval(tick);
          if (timerEl) timerEl.textContent = '✓';
          const enableContinue = () => {
            closeBtn.disabled = false;
            closeBtn.style.opacity = '1';
            closeBtn.textContent = '✅ Continue';
            closeBtn.onclick = () => {
              if (overlay.parentNode) document.body.removeChild(overlay);
              resolve();
            };
          };
          if (userClicked) {
            enableContinue();
          } else {
            closeBtn.textContent = '👆 Tap the ad first';
            hint.textContent = '⚠️ Tap the ad above to unlock Continue';
            hint.style.background = 'rgba(239,68,68,.9)';
            const waitClick = setInterval(() => {
              if (userClicked) { clearInterval(waitClick); enableContinue(); }
            }, 300);
          }
        }
      }, 1000);
    });
  }

  async function showMonetagDirectAd() {
    title.textContent = `Ad 2 of ${REQUIRED_ADS}`;
    subtitle.textContent = 'Sponsored ad loading inside Mini App.';
    return showInAppSponsoredAd(MONETAG_DIRECT_LINK, 'monetag2', 'Monetag');
  }

  async function handleClick() {
    if (started) return;
    started = true;
    btn.disabled = true;
    err.textContent = '';

    title.textContent = 'Ads loading...';
    subtitle.textContent = 'Do not close this screen.';

    try {
      setBtn('<span class="loader"></span> Loading Ads...', true);
      console.log('[Ads] Manual rewarded flow active count:', REQUIRED_ADS, 'zone:', ZONE_ID);
      await showRewardedAdsSequentially();
      // Monetag direct link as 2nd ad
      await showMonetagDirectAd();
      completed = true;
      console.log('[Ads] All ads completed');
    } catch (e) {
      console.warn('[Ads] SDK flow failed, switching to Direct Link fallback:', e.message);
      try {
        title.textContent = 'Using backup ads';
        subtitle.textContent = 'SDK ads block ho rahe hain — direct link mode on.';
        await showDirectLinkAds();
        await showMonetagDirectAd();
        completed = true;
        console.log('[Ads] Direct link ads completed');
      } catch (e2) {
        console.error(e2);
        err.textContent = e2.message || 'Ad failed. Please try again.';
        setBtn('Retry');
        btn.onclick = handleClick;
        btn.disabled = false;
        started = false;
        return;
      }
    }
    btn.onclick = handleClick;
    await finish();
  }

  // Pre-warm: start loading SDK as soon as the page opens so first click is fast
  ensureSdk().catch(e => console.warn('[Ads] preload SDK failed:', e.message));

  async function finish() {
    setBtn('<span class="loader"></span> Verifying...', true);
    title.textContent = 'Almost done!';
    subtitle.textContent = 'Confirming your reward...';
    try {
      const res = await fetch(VERIFY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: TOKEN, ads_watched: completed ? REQUIRED_ADS : 0 })
      });
      const data = await res.json();
      if (!res.ok || !data.ok) throw new Error(data.error || 'Verification failed');

      document.getElementById('card').innerHTML =
        '<div class="success">✅</div>' +
        '<h1>All done!</h1>' +
        '<p class="sub" style="margin:12px 0 24px">Opening your file in Telegram...</p>' +
        '<button onclick="goBack()">Open File</button>';
      setTimeout(goBack, 800);
    } catch (e) {
      err.textContent = e.message;
      setBtn('🔄 Retry Verification');
      btn.onclick = finish;
    }
  }

  function goBack() {
    if (tg) {
      tg.openTelegramLink(REDIRECT_URL);
      setTimeout(() => tg.close(), 300);
    } else {
      window.location.href = REDIRECT_URL;
    }
  }
</script>
</body>
</html>
